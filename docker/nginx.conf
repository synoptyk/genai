server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri /index.html;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location /static/ {
    expires 1y;
    add_header Cache-Control "public, no-transform";
  }

  location /health {
    return 200 'ok';
    add_header Content-Type text/plain;
  }
}
