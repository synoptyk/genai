<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradientes vibrantes -->
    <linearGradient id="brainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D9FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0066FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="sGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00D9FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0088FF;stop-opacity:1" />
    </linearGradient>

    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00D9FF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:0.2" />
    </radialGradient>

    <!-- Filtros de brillo y sombra -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="brightGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.6"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Fondo con gradiente radial -->
  <circle cx="256" cy="256" r="256" fill="url(#glowGradient)" opacity="0.15"/>
  <rect width="512" height="512" fill="#0A0E27"/>

  <!-- Grupo ancho: cerebro y S -->
  <g filter="url(#shadow)">
    <!-- CEREBRO (lado derecho) -->
    <g>
      <!-- Forma base del cerebro con undulaciones -->
      <path d="M 340 140 Q 380 140 400 170 Q 420 200 415 240 Q 410 280 380 300 Q 350 310 320 305 Q 310 340 300 360 Q 280 340 270 305 Q 240 310 210 305 Q 180 290 170 240 Q 165 200 180 170 Q 200 140 240 140 Q 270 135 290 145 Q 310 135 340 140" 
            fill="url(#brainGradient)" opacity="0.9"/>
      
      <!-- Detalles de circuitos neurales -->
      <g stroke="#00D9FF" stroke-width="2" fill="none" opacity="0.8" filter="url(#glow)">
        <!-- Conexiones de red neuronal -->
        <line x1="280" y1="155" x2="320" y2="140"/>
        <line x1="320" y1="140" x2="350" y2="160"/>
        <line x1="350" y1="160" x2="370" y2="190"/>
        <line x1="370" y1="190" x2="390" y2="220"/>
        <line x1="390" y1="220" x2="400" y2="260"/>
        <line x1="400" y1="260" x2="380" y2="290"/>
        <line x1="290" y1="145" x2="310" y2="175"/>
        <line x1="310" y1="175" x2="330" y2="200"/>
        <line x1="330" y1="200" x2="350" y2="230"/>
        <line x1="350" y1="230" x2="360" y2="270"/>
      </g>

      <!-- Puntos brillantes de conexión neuronal (cyan) -->
      <g fill="#00D9FF" filter="url(#brightGlow)">
        <circle cx="280" cy="155" r="5" opacity="0.9"/>
        <circle cx="320" cy="140" r="6" opacity="1"/>
        <circle cx="350" cy="160" r="5" opacity="0.9"/>
        <circle cx="370" cy="190" r="5" opacity="0.8"/>
        <circle cx="390" cy="220" r="6" opacity="1"/>
        <circle cx="400" cy="260" r="5" opacity="0.9"/>
        <circle cx="310" cy="175" r="5" opacity="0.8"/>
        <circle cx="330" cy="200" r="5" opacity="0.9"/>
      </g>

      <!-- Puntos de conexión en naranja (hacia abajo/derecha) -->
      <g fill="#FF6B35" filter="url(#brightGlow)">
        <circle cx="360" cy="270" r="5" opacity="0.9"/>
        <circle cx="350" cy="230" r="5" opacity="0.8"/>
        <circle cx="380" cy="290" r="6" opacity="1"/>
      </g>

      <!-- Malla de fondo del cerebro -->
      <g stroke="#0066FF" stroke-width="1" fill="none" opacity="0.4">
        <path d="M 260 200 Q 290 190 320 200 Q 340 210 360 230"/>
        <path d="M 270 250 Q 300 240 330 250 Q 350 260 370 280"/>
      </g>
    </g>

    <!-- S ESTILIZADA (lado izquierdo) -->
    <g filter="url(#brightGlow)">
      <!-- Parte superior de la S -->
      <path d="M 200 200 Q 170 200 160 220 Q 150 240 170 250 Q 190 255 210 250" 
            fill="none" stroke="url(#sGradient)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
      
      <!-- Parte media de la S -->
      <path d="M 210 250 Q 190 260 190 280 Q 190 300 210 305 Q 230 310 200 320" 
            fill="none" stroke="url(#sGradient)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
      
      <!-- Parte inferior de la S -->
      <path d="M 200 320 Q 170 330 160 350 Q 150 370 185 375 Q 210 378 220 360" 
            fill="none" stroke="url(#sGradient)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Brillo adicional en los bordes de la S -->
      <path d="M 200 200 Q 170 200 160 220 Q 150 240 170 250 Q 190 255 210 250" 
            fill="none" stroke="#00D9FF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
    </g>
  </g>

  <!-- Aura de luz vibrante alrededor del logo -->
  <circle cx="280" cy="250" r="140" fill="none" stroke="url(#brainGradient)" stroke-width="2" opacity="0.3" filter="url(#glow)"/>
  <circle cx="280" cy="250" r="160" fill="none" stroke="url(#brainGradient)" stroke-width="1" opacity="0.15" filter="url(#glow)"/>

  <!-- Puntos de luz flotante para dar efecto 3D -->
  <g fill="#00D9FF" opacity="0.6" filter="url(#brightGlow)">
    <circle cx="120" cy="180" r="3"/>
    <circle cx="420" cy="320" r="3"/>
    <circle cx="150" cy="380" r="2.5"/>
  </g>
</svg>