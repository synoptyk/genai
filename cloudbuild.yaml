steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'docker/server.Dockerfile'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/docker-repo/genai-server:latest'
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/docker-repo/genai-server:latest'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/docker-repo/genai-server:latest'

options:
  machineType: 'N1_HIGHCPU_8'
