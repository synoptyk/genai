steps:
  # Build Server Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'docker/server.Dockerfile'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/docker-repo/genai-server:latest'
      - '.'

  # Build Client Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'docker/client.Dockerfile'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/docker-repo/genai-client:latest'
      - '.'

  # Push Server to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/docker-repo/genai-server:latest'

  # Push Client to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/docker-repo/genai-client:latest'

  # Deploy Server to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'genai-server'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/docker-repo/genai-server:latest'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'

  # Deploy Client to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'genai-client'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/docker-repo/genai-client:latest'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/docker-repo/genai-server:latest'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/docker-repo/genai-client:latest'

options:
  machineType: 'N1_HIGHCPU_8'
